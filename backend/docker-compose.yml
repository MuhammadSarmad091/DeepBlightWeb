version: '3.8'

services:
  deepblight-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepblight-backend
    ports:
      - "5000:5000"
    environment:
      # MongoDB Configuration
      MONGO_URI: ${MONGO_URI}
      DATABASE_NAME: ${DATABASE_NAME:-deepblight}
      
      # Flask Configuration
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: ${FLASK_DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      
      # AWS S3 Configuration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      
      # Email Configuration
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USE_TLS: ${MAIL_USE_TLS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      
      # Trefle API Configuration
      TREFLE_API_TOKEN: ${TREFLE_API_TOKEN}
      
    volumes:
      - ./uploads:/app/uploads
      - ./storage:/app/storage
      - ./logs:/app/logs
    
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads:
  storage:
  logs:
